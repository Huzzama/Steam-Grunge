name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  VERSION: ${{ github.ref_name }}

jobs:
  # ── Linux ───────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Write VERSION file
        run: echo "${VERSION#v}" > VERSION

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-venv \
            debhelper devscripts build-essential \
            imagemagick wget libfuse2 fakeroot dpkg-dev

      - name: Generate multi-size icons
        run: |
          for size in 16 32 48 64 128 256; do
            mkdir -p packaging/shared/icons/${size}x${size}
            convert app/assets/icon.png -resize ${size}x${size} \
              packaging/shared/icons/${size}x${size}/steam-grunge-editor.png
          done

      - name: Build AppImage
        run: |
          chmod +x packaging/appimage/build-appimage.sh
          bash packaging/appimage/build-appimage.sh

      - name: Build .deb package
        run: |
          chmod +x packaging/debian/build-deb.sh
          bash packaging/debian/build-deb.sh

      - name: Generate checksums
        run: |
          sha256sum \
            packaging/appimage/Steam_Grunge_Editor-*.AppImage \
            packaging/debian/steam-grunge-editor_*.deb \
            > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Steam Grunge Editor ${{ github.ref_name }}"
          body: |
            ## Steam Grunge Editor ${{ github.ref_name }}

            Create distressed, grunge-style custom artwork for your Steam library.

            ### Downloads

            | File | Platform |
            |------|----------|
            | `Steam_Grunge_Editor-*-x86_64.AppImage` | 🐧 Any Linux distro (universal) |
            | `steam-grunge-editor_*_all.deb` | 🐧 Ubuntu, Mint, Debian, Pop!_OS |
            | `SteamGrungeEditor-*-Setup.exe` | 🪟 Windows 10/11 |
            | `Steam_Grunge_Editor-*.dmg` | 🍎 macOS Big Sur 11.0+ |

            ### Install

            **🐧 AppImage:**
            ```bash
            chmod +x Steam_Grunge_Editor-*-x86_64.AppImage
            ./Steam_Grunge_Editor-*-x86_64.AppImage
            ```
            **🐧 Debian / Ubuntu / Linux Mint:**
            ```bash
            sudo dpkg -i steam-grunge-editor_*_all.deb
            sudo apt-get install -f
            ```
            **🐧 Arch Linux (AUR):**
            ```bash
            yay -S steam-grunge-editor
            ```
            **🪟 Windows:** Run the `.exe` installer and follow the wizard.

            **🍎 macOS:** Open the `.dmg`, drag to Applications.
            First launch: right-click → Open (bypasses Gatekeeper warning).

            ### Verify checksums
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
          generate_release_notes: true
          files: |
            packaging/appimage/Steam_Grunge_Editor-*.AppImage
            packaging/debian/steam-grunge-editor_*.deb
            SHA256SUMS.txt