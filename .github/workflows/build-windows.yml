name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:      # allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows .exe Installer
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Convert icon.png to icon.ico
        run: |
          python -c "
          from PIL import Image
          img = Image.open('app/assets/icon.png')
          img.save('app/assets/icon.ico', format='ICO',
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print('icon.ico created')
          "

      - name: Build with PyInstaller
        run: |
          pyinstaller packaging/windows/steam_grunge_editor.spec --noconfirm --clean

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes
        shell: powershell

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          mkdir dist\installer
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ^
            /DAppVersion=${{ env.VERSION }} ^
            packaging\windows\steam_grunge_editor.iss

      - name: Generate checksum
        shell: bash
        run: |
          cd dist/installer
          sha256sum SteamGrungeEditor-*-Setup.exe > SHA256SUMS-windows.txt
          cat SHA256SUMS-windows.txt

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/installer/SteamGrungeEditor-*-Setup.exe
            dist/installer/SHA256SUMS-windows.txt
