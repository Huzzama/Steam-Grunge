name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows .exe Installer
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version
        shell: bash
        run: |
          RAW="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$RAW" >> $GITHUB_ENV
          echo "$RAW" > VERSION
          echo "Building version: $RAW"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Convert icon.png to icon.ico
        run: |
          python -c "
          from PIL import Image
          img = Image.open('app/assets/icon.png')
          img.save('app/assets/icon.ico', format='ICO',
                   sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print('icon.ico created')
          "

      - name: Build with PyInstaller
        run: |
          pyinstaller packaging/windows/steam_grunge_editor.spec --noconfirm --clean

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          mkdir dist\installer
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ^
            /DAppVersion=${{ env.VERSION }} ^
            packaging\windows\steam_grunge_editor.iss

      - name: Verify installer version
        shell: bash
        run: |
          ls dist/installer/
          echo "Expected: SteamGrungeEditor-${{ env.VERSION }}-Setup.exe"

      - name: Generate checksum
        shell: bash
        run: |
          cd dist/installer
          sha256sum SteamGrungeEditor-*-Setup.exe > SHA256SUMS-windows.txt
          cat SHA256SUMS-windows.txt

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Wait for the release to exist (Linux job creates it)
          for i in {1..10}; do
            gh release view "$TAG" && break || sleep 15
          done
          gh release upload "$TAG" \
            dist/installer/SteamGrungeEditor-*-Setup.exe \
            dist/installer/SHA256SUMS-windows.txt \
            --clobber